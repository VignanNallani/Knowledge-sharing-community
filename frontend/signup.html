<!DOCTYPE html>
<html lang="en" class="h-full scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Knowledge Sharing</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Cal+Sans:wght@600;700&display=swap"
    rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['Cal Sans', 'Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            brand: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95' },
            accent: { 500: '#22d3ee', 600: '#06b6d4' }
          },
          backgroundImage: {
            glow: 'radial-gradient(1200px 600px at 10% -10%, rgba(124,58,237,.20), transparent 60%),radial-gradient(900px 500px at 110% 10%, rgba(6,182,212,.18), transparent 60%),radial-gradient(900px 500px at 50% 120%, rgba(236,72,153,.16), transparent 60%)',
          },
        }
      }
    }
  </script>

  <link rel="stylesheet" href="index.css">
</head>

<body class="min-h-full bg-neutral-950 text-neutral-200 flex items-center justify-center relative overflow-hidden">

  <!-- Glow background -->
  <div class="absolute inset-0 bg-glow"></div>

  <div class="relative z-10 bg-neutral-900/90 backdrop-blur-xl shadow-xl rounded-3xl p-8 w-full max-w-md">
    <h1 class="text-4xl font-display font-extrabold text-center text-white mb-6">Create Account</h1>

    <form id="signupForm" class="space-y-5">

      <!-- Name -->
      <div class="relative">
        <label class="block text-sm font-medium text-neutral-300 mb-1">Name</label>
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M5.121 17.804A4 4 0 018 15h8a4 4 0 012.879 2.804M12 12a5 5 0 100-10 5 5 0 000 10z" />
          </svg>
        </span>
        <input type="text" id="name" name="name" required
          class="pl-10 mt-1 block w-full rounded-xl border border-white/20 bg-neutral-800 px-4 py-2 text-white placeholder:text-neutral-400 focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
          placeholder="Enter your name" />
      </div>

      <!-- Email -->
      <div class="relative">
        <label class="block text-sm font-medium text-neutral-300 mb-1">Email</label>
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 12h.01M12 16h.01M8 12h.01M21 12c0 4.418-4.03 8-9 8s-9-3.582-9-8 4.03-8 9-8 9 3.582 9 8z" />
          </svg>
        </span>
        <input type="email" id="email" name="email" required
          class="pl-10 mt-1 block w-full rounded-xl border border-white/20 bg-neutral-800 px-4 py-2 text-white placeholder:text-neutral-400 focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
          placeholder="Enter your email" />
      </div>

      <!-- Password -->
      <div class="relative">
        <label class="block text-sm font-medium text-neutral-300 mb-1">Password</label>
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 11c0-1.104.896-2 2-2h4a2 2 0 012 2v4a2 2 0 01-2 2h-4c-1.104 0-2-.896-2-2v-4z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 11V7a4 4 0 014-4h0a4 4 0 014 4v4" />
          </svg>
        </span>
        <input type="password" id="password" name="password" required
          class="pl-10 mt-1 block w-full rounded-xl border border-white/20 bg-neutral-800 px-4 py-2 text-white placeholder:text-neutral-400 focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
          placeholder="Enter a password" />
      </div>

      <!-- Skills -->
      <div class="relative">
        <label class="block text-sm font-medium text-neutral-300 mb-1">Skills (comma-separated)</label>
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 4v16m8-8H4" />
          </svg>
        </span>
        <input type="text" id="skills" name="skills"
          class="pl-10 mt-1 block w-full rounded-xl border border-white/20 bg-neutral-800 px-4 py-2 text-white placeholder:text-neutral-400 focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
          placeholder="e.g. JavaScript, Python, AI" />
      </div>

      <!-- Submit -->
      <button type="submit"
        class="w-full bg-gradient-to-r from-brand-600 to-fuchsia-500 hover:opacity-90 text-white font-semibold py-2 px-4 rounded-xl transition-all">
        Sign Up
      </button>

    </form>

    <p class="text-center text-sm text-neutral-400 mt-4">
      Already have an account? <a href="signin.html" class="text-accent-500 hover:underline">Sign in</a>.
    </p>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const skills = document.getElementById('skills').value;

      try {
        const res = await fetch('http://localhost:4000/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, skills })
        });

        const data = await res.json();
        if (res.ok) {
          alert('Signup successful! Please log in.');
          window.location.href = 'signin.html';
        } else {
          alert(data.error || 'Signup failed.');
        }
      } catch (err) {
        console.error(err);
        alert('Server error. Please try again later.');
      }
    });
  </script>

</body>
</html>
