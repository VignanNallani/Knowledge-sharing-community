version: '3.8'

services:
  # PostgreSQL Database (Development)
  postgres:
    image: postgres:15-alpine
    container_name: knowledge-sharing-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: knowledge_sharing_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - knowledge-sharing-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledge_sharing_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis Cache (Development)
  redis:
    image: redis:7-alpine
    container_name: knowledge-sharing-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    networks:
      - knowledge-sharing-dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend (Development with hot reload)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      target: development
    container_name: knowledge-sharing-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/knowledge_sharing_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-change-in-production
      FRONTEND_URL: http://localhost:5173
      DEBUG_MODE: true
      LOG_LEVEL: debug
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    ports:
      - "3000:3000"
      - "9229:9229"  # Debug port
    networks:
      - knowledge-sharing-dev-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  # Frontend (Development with hot reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      target: development
    container_name: knowledge-sharing-frontend-dev
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - knowledge-sharing-dev-network
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

  # Development tools
  adminer:
    image: adminer:latest
    container_name: knowledge-sharing-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - knowledge-sharing-dev-network
    depends_on:
      - postgres

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: knowledge-sharing-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    networks:
      - knowledge-sharing-dev-network
    depends_on:
      - redis

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  knowledge-sharing-dev-network:
    driver: bridge
